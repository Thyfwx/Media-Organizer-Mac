<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cute Pastel Blue to Purple Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C3FC" /> <!-- Pastel Purple -->
      <stop offset="100%" stop-color="#8EC5FC" /> <!-- Pastel Blue -->
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3" flood-color="#000000"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)" />
  
  <!-- Instructions -->
  <text x="300" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1" filter="url(#shadow)">Drag to Install</text>

  <!-- Arrow Graphic -->
  <g transform="translate(270, 185)" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" filter="url(#shadow)">
    <path d="M 0 15 L 60 15" />
    <path d="M 40 0 L 60 15 L 40 30" />
  </g>
</svg>
