<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Liquid Glass Gradient for Folder Body -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
    </linearGradient>

    <!-- Unique Spectrum Gradient for the Tab -->
    <linearGradient id="spectrumGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6F00FF" /> <!-- Electric Indigo -->
      <stop offset="25%" style="stop-color:#00E5EE" /> <!-- Tropical Cyan -->
      <stop offset="50%" style="stop-color:#00FF7F" /> <!-- Aurora Green -->
      <stop offset="75%" style="stop-color:#FFD700" /> <!-- Solar Gold -->
      <stop offset="100%" style="stop-color:#FF1493" /> <!-- Sunset Magenta -->
    </linearGradient>

    <!-- Specular Highlight -->
    <linearGradient id="specularHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" />
      <feOffset dx="0" dy="15" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Shadow Group -->
  <g filter="url(#shadow)">
    <!-- Folder Back Tab -->
    <path d="M120 280 C 120 240, 160 220, 200 220 L 450 220 C 490 220, 520 240, 520 280 L 520 320 L 120 320 Z" fill="url(#spectrumGradient)" opacity="0.9" />
    
    <!-- Main Folder Body (The "Glass") -->
    <rect x="100" y="320" width="824" height="520" rx="60" ry="60" fill="url(#glassGradient)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" />
    
    <!-- Specular Highlight Overlay -->
    <path d="M160 320 L 864 320 C 894 320, 924 350, 924 380 L 924 450 L 100 450 L 100 380 C 100 350, 130 320, 160 320 Z" fill="url(#specularHighlight)" />
    
    <!-- Central Media Icon (Play Button) -->
    <circle cx="512" cy="580" r="100" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="4" stroke-opacity="0.4" />
    <path d="M480 520 L 580 580 L 480 640 Z" fill="#ffffff" fill-opacity="0.8" />
  </g>
</svg>
